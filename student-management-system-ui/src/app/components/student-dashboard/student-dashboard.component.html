<div class="dashboard-grid">
  <mat-card class="student-card" *ngFor="let student of students">
    <img [src]="student.imageUrl" [alt]="student.name" class="student-image" />

    <div class="student-meta">
      <span class="course-label">Course</span>
      <h3>{{ student.name }}</h3>
      <p class="professor-name">{{ student.professor }}</p>
      <p class="designation">{{ student.designation }}</p>
    </div>

    <div class="card-footer">
      <button mat-icon-button class="notifications-button" aria-label="Notifications">
        <mat-icon>notifications</mat-icon>
        <span class="badge" *ngIf="student.notifications">{{ student.notifications }}</span>
      </button>

      <button mat-raised-button color="primary" class="go-button">
        Go
        <mat-icon>arrow_forward</mat-icon>
      </button>
    </div>
  </mat-card>
</div>

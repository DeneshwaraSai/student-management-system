<mat-sidenav-container class="app-shell">
  <mat-sidenav #drawer class="app-sidenav" fixedInViewport="true" mode="side" opened>
    <mat-nav-list>
      <div class="nav-brand">
        <span>School System</span>
      </div>
      <mat-divider></mat-divider>
      <a mat-list-item *ngFor="let item of navItems" [routerLink]="item.route" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="top-toolbar">
      <button mat-icon-button class="mobile-menu-button" (click)="drawer.toggle()" aria-label="Toggle navigation">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">{{ title }}</span>
      <span class="toolbar-spacer"></span>
      <button mat-icon-button aria-label="Notifications">
        <mat-icon>notifications</mat-icon>
      </button>
      <button mat-icon-button aria-label="User profile">
        <mat-icon>account_circle</mat-icon>
      </button>
    </mat-toolbar>

    <div class="main-content">
      <!-- <div class="welcome-card">
        <h1>Welcome to {{ title }}</h1>
        <p>Use the side navigation to explore the dashboard, student records, course information, attendance, and reports.</p>
      </div> -->
       
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
